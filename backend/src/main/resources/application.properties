# Server Port
server.port=8081

# Database Configuration (H2 File-based for persistence)
spring.datasource.url=jdbc:h2:file:./data/resumedb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# File Upload Settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT Secrets (Override in production via env vars)
jwt.secret=${JWT_SECRET:9a4f2c8d3e7b1a5c6d8e0f1a2b3c4d5e6f7g8h9i0j1k2l3m4n5o6p7q8r9s0t1u}
jwt.expiration=86400000

# AI Service URL
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

# Logging
logging.level.com.resumeanalyzer=INFO

# Razorpay Configuration
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:rzp_test_secret_placeholder}
